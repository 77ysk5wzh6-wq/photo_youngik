<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youn Youngik</title>
  <link rel="icon" type="image/png" href="fav.png?" />
  <link rel="shortcut icon" type="image/x-icon" href="fav.png?" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fffffd;
      font-family: 'Fira Mono', monospace;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 2.2vh 2.4vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: clamp(8px, 0.65vw, 11px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #111;
      white-space: nowrap;
    }

    .contact {
      display: flex;
      gap: 2vw;
    }

    .contact a {
      font-size: clamp(8px, 0.65vw, 11px);
      text-decoration: none;
      color: #111;
      letter-spacing: 0.04em;
      transition: color 0.25s;
      white-space: nowrap;
    }

    .contact a[href^="mailto"] {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .contact a:hover { color: #bbb; }

    /* ── Loading screen ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #fffffd;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.7s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading span {
      font-family: 'Fira Mono', monospace;
      font-size: clamp(10px, 1.2vw, 15px);
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #111;
    }

    /* 큐브는 JS가 개별 position:fixed로 관리 */
    .color-dots span {
      position: fixed;
      display: block;
      z-index: 200;
      pointer-events: all;
      cursor: pointer;
    }

    .stack {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }

    .card {
      position: absolute;
      pointer-events: all;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    @media (max-width: 600px) {
      header { padding: 4vw 5vw; }
      header h1 { font-size: 10px; letter-spacing: 0; }
      .contact { gap: 5vw; }
      .contact a { font-size: 10px; }
    }
  </style>
</head>
<body>

  <div id="loading"><span>youn youngik</span></div>

  <header>
    <h1>Youn Youngik – Seoul</h1>
    <div class="contact">
      <a href="https://instagram.com/youngikyoun" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:yge05096@naver.com">yge05096@naver.com</a>
    </div>
  </header>

  <div class="color-dots">
    <span style="background:rgb(134,100,213)"></span>
    <span style="background:rgb(218,254,99)"></span>
    <span style="background:rgb(241,165,250)"></span>
    <span style="background:rgb(230,52,35)"></span>
    <span style="background:rgb(0,0,0)"></span>
  </div>

  <div class="stack" id="stack"></div>

  <script>
    // ── Photo stack ─────────────────────────────────────────
    const IMAGES = Array.from({length: 27}, (_, i) =>
      `assets_web/youn_photo_${String(i + 1).padStart(2, '0')}.jpg`
    );

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    shuffle(IMAGES);

    // 15번 사진을 가장 위(맨 앞)에 고정
    const frontPhoto = 'assets_web/youn_photo_15.jpg';
    const frontIdx = IMAGES.indexOf(frontPhoto);
    if (frontIdx > -1) {
      IMAGES.splice(frontIdx, 1);
      IMAGES.push(frontPhoto);
    }

    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    const rand = mulberry32(Date.now()); // 시드를 현재 시간으로 변경하여 매번 다른 레이아웃 유도
    const layout = IMAGES.map(() => ({ ratio: rand() }));

    const container = document.getElementById('stack');
    let deck = [];

    const GAP = 16;
    const MOBILE_BOTTOM = window.innerHeight * 0.055;

    function calcSize(img, ratio) {
      const headerH = document.querySelector('header').offsetHeight;
      const availH = window.innerHeight - headerH - GAP * 2;
      const availW = window.innerWidth - GAP;
      const isLandscape = img.naturalWidth >= img.naturalHeight;
      const ar = img.naturalHeight / img.naturalWidth;
      let w;
      if (window.innerWidth <= 600) {
        if (isLandscape) {
          const maxW = availW * 0.9;
          w = maxW * (0.8 + ratio * 0.2);
        } else {
          const maxW = availW * 0.9;
          const minW = maxW * 0.78;
          w = minW + ratio * (maxW - minW);
          if (w * ar > availH) w = availH / ar;
        }
      } else {
        if (isLandscape) {
          const maxW = window.innerWidth * 0.72;
          const minW = maxW * 0.56;
          w = minW + ratio * (maxW - minW);
        } else {
          const maxH = window.innerHeight * 0.9;
          const minH = maxH * 0.78;
          const h = minH + ratio * (maxH - minH);
          w = h / ar;
        }
      }
      return w;
    }

    function buildStack() {
      container.innerHTML = '';
      deck = [];
      IMAGES.forEach((src, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const bottomGap = window.innerWidth <= 600 ? MOBILE_BOTTOM : GAP;
        card.style.cssText = `right:${GAP}px; bottom:${bottomGap}px; z-index:${i + 1};`;
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.loading = i >= IMAGES.length - 4 ? 'eager' : 'lazy';
        img.onload = function () {
          card.style.width = calcSize(img, layout[i].ratio) + 'px';
          card.style.opacity = '1';
        };
        img.addEventListener('dragstart', e => e.preventDefault());
        card.appendChild(img);
        container.appendChild(card);
        deck.push(card);
      });
      bindCards();
    }

    function randomizeSize(card) {
      const img = card.querySelector('img');
      if (!img || !img.naturalWidth) return;
      card.style.width = calcSize(img, Math.random()) + 'px';
    }

    function sendToBack(card) {
      playTypewriter();
      // 스택에서 제거 후 맨 앞(index 0)으로
      const idx = deck.indexOf(card);
      if (idx === -1) return;
      deck.splice(idx, 1);
      deck.unshift(card);
      deck.forEach((c, i) => (c.style.zIndex = i + 1));
      // 위치를 다시 오른쪽 하단 기본값으로
      const bottomGap = window.innerWidth <= 600 ? MOBILE_BOTTOM : GAP;
      card.style.left   = '';
      card.style.top    = '';
      card.style.right  = GAP + 'px';
      card.style.bottom = bottomGap + 'px';
      randomizeSize(card);
    }

    // ── Drag & click ─────────────────────────────────────────
    let dragState = null;
    const DRAG_THRESHOLD = 6;

    function bindCards() {
      deck.forEach(card => {
        card.onmousedown  = e => pointerDown(e, card, e.clientX, e.clientY);
        card.ontouchstart = e => {
          const touch = e.touches[0];
          pointerDown(e, card, touch.clientX, touch.clientY);
        };
      });
    }

    function pointerDown(e, card, cx, cy) {
      e.preventDefault();
      // 드래그 시작 전 left/top으로 전환
      const rect = card.getBoundingClientRect();
      card.style.left   = rect.left + 'px';
      card.style.top    = rect.top  + 'px';
      card.style.right  = 'auto';
      card.style.bottom = 'auto';
      card.style.cursor = 'grabbing';

      dragState = {
        card,
        startX:  cx,
        startY:  cy,
        offsetX: cx - rect.left,
        offsetY: cy - rect.top,
        moved:   false,
      };
    }

    document.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => {
      if (!dragState) return;
      e.preventDefault();
      const t = e.touches[0];
      pointerMove(t.clientX, t.clientY);
    }, { passive: false });

    function pointerMove(cx, cy) {
      if (!dragState) return;
      const dx = cx - dragState.startX;
      const dy = cy - dragState.startY;
      if (!dragState.moved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
        dragState.moved = true;
      }
      if (!dragState.moved) return;
      dragState.card.style.left = (cx - dragState.offsetX) + 'px';
      dragState.card.style.top  = (cy - dragState.offsetY) + 'px';
    }

    document.addEventListener('mouseup',   () => pointerUp());
    document.addEventListener('touchend',  () => pointerUp());

    function pointerUp() {
      if (!dragState) return;
      const { card, moved } = dragState;
      dragState = null;
      card.style.cursor = '';

      if (!moved) {
        // 그냥 클릭 → 맨 뒤로
        sendToBack(card);
      // 드래그든 클릭이든 z-index는 건드리지 않음
      }
      bindCards();
    }

    function playTypewriter() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume();
      const t = ctx.currentTime;

      // 짧은 고주파 노이즈
      const bufferSize = ctx.sampleRate * 0.025;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 12);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const hpf = ctx.createBiquadFilter();
      hpf.type = 'highpass';
      hpf.frequency.value = 4000;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.025);

      // 리버브 — 짧은 임펄스 컨볼버
      const reverbLen = ctx.sampleRate * 0.6;
      const reverbBuf = ctx.createBuffer(2, reverbLen, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = reverbBuf.getChannelData(ch);
        for (let i = 0; i < reverbLen; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLen, 5);
        }
      }
      const convolver = ctx.createConvolver();
      convolver.buffer = reverbBuf;

      const reverbGain = ctx.createGain();
      reverbGain.gain.value = 0.18;

      const dryGain = ctx.createGain();
      dryGain.gain.value = 1;

      // 저음 — 아주 짧고 작은 틱
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.03);
      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.04, t);
      oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

      noise.connect(hpf);
      hpf.connect(gain);
      gain.connect(dryGain);
      gain.connect(convolver);
      convolver.connect(reverbGain);
      dryGain.connect(ctx.destination);
      reverbGain.connect(ctx.destination);
      osc.connect(oscGain);
      oscGain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.03);

      noise.start(t);
      noise.stop(t + 0.025);
    }

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'ArrowRight') {
        if (deck.length) sendToBack(deck[deck.length - 1]);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') e.preventDefault();
    });

    // ── Color cubes ──────────────────────────────────────────
    const CUBE_COLORS = [
      'rgb(134,100,213)',
      'rgb(218,254,99)',
      'rgb(241,165,250)',
      'rgb(230,52,35)',
      'rgb(0,0,0)',
    ];

    function getCubeSize() {
      return window.innerWidth <= 600 ? 10 : 16;
    }

    let cubeState = [];

    function initCubes() {
      const size   = getCubeSize();
      const isMobile = window.innerWidth <= 600;
      const headerH  = document.querySelector('header').offsetHeight;
      const spans    = Array.from(document.querySelectorAll('.color-dots span'));

      let startCols, startRow;

      if (isMobile) {
        // 헤더 바로 아래, 오른쪽 끝에 딱 붙게
        const rightEdge = Math.floor(window.innerWidth / size) - 1;
        startCols = spans.map((_, i) => rightEdge - (spans.length - 1 - i));
        startRow  = Math.floor((window.innerHeight - headerH) / size) - 1;
      } else {
        // 왼쪽 하단
        const baseCol = Math.floor(window.innerWidth * 0.024 / size);
        const baseRow = Math.floor(window.innerHeight * 0.024 / size);
        startCols = spans.map((_, i) => baseCol + i);
        startRow  = baseRow;
      }

      cubeState = spans.map((el, i) => {
        const col = startCols[i];
        const row = startRow;
        el.style.width  = size + 'px';
        el.style.height = size + 'px';
        el.style.left   = col * size + 'px';
        el.style.bottom = row * size + 'px';
        
        const cubeObj = { col, row, el, dashing: false };
        
        el.onclick = () => dashToWall(cubeObj);
        
        return cubeObj;
      });
    }

    function dashToWall(cube) {
      if (cube.dashing) return;
      cube.dashing = true;
      cube.animating = false; // 진행 중인 회전 상태 수동 해제
      playTypewriter();

      const el = cube.el;
      // 현재 회전 애니메이션 등이 있다면 즉시 중단
      el.style.transition = 'none';
      el.style.transform = 'none';
      
      const rect = el.getBoundingClientRect();
      const currentWidth = rect.width;
      el.style.left = rect.left + 'px';
      el.style.bottom = (window.innerHeight - rect.bottom) + 'px';

      // 왼쪽 벽으로 돌진
      const targetLeft = 0;
      const distance = rect.left;

      // 거리 비례 속도
      const duration = (distance / 1000) + 0.3; 
      
      requestAnimationFrame(() => {
        el.style.transition = `left ${duration}s linear`;
        el.style.left = targetLeft + 'px';
      });

      const onHitWall = (e) => {
        if (e.propertyName === 'left') {
          el.removeEventListener('transitionend', onHitWall);
          
          // 벽에 부딪히며 사라짐 (폭 줄어들기)
          el.style.transition = 'width 0.4s ease-in, opacity 0.4s ease-in';
          el.style.width = '0px';
          el.style.opacity = '0';

          setTimeout(() => {
            el.remove();
            const idx = cubeState.indexOf(cube);
            if (idx !== -1) cubeState.splice(idx, 1);
          }, 450);
        }
      };
      el.addEventListener('transitionend', onHitWall);
    }

    // 방향별 pivot corner & 회전 각도
    const ROLL = {
      ' 1, 0': { origin: 'right bottom', angle:  90 }, // 오른쪽
      '-1, 0': { origin: 'left bottom',  angle: -90 }, // 왼쪽
      ' 0, 1': { origin: 'right top',    angle:  90 }, // 위
      ' 0,-1': { origin: 'right bottom', angle: -90 }, // 아래
    };

    // 저음 위주 + 고음 일부 (C2~C5)
    const PIANO_NOTES = [
      'C2','E2','G2','A2',
      'C3','D3','E3','G3','A3','B3',
      'C4','D4','E4','G4','A4',
      'C5','E5'
    ];

    let pianoSampler = null;
    let pianoReady   = false;

    function initPiano() {
      // C2~E5 범위에 필요한 샘플만 로드
      pianoSampler = new Tone.Sampler({
        urls: {
          C2: 'C2.mp3', 'D#2': 'Ds2.mp3', 'F#2': 'Fs2.mp3', A2: 'A2.mp3',
          C3: 'C3.mp3', 'D#3': 'Ds3.mp3', 'F#3': 'Fs3.mp3', A3: 'A3.mp3',
          C4: 'C4.mp3', 'D#4': 'Ds4.mp3', 'F#4': 'Fs4.mp3', A4: 'A4.mp3',
          C5: 'C5.mp3', 'D#5': 'Ds5.mp3',
        },
        baseUrl: 'https://tonejs.github.io/audio/salamander/',
        release: 2.5,
        onload: () => {
          pianoReady = true;
          checkAllLoaded();
        },
      }).toDestination();
      pianoSampler.volume.value = -32;
    }

    function playCubeMove() {
      if (!pianoReady) return;
      const note = PIANO_NOTES[Math.floor(Math.random() * PIANO_NOTES.length)];
      // attack만 트리거 — release 자연스럽게 울리도록 (겹침 허용)
      pianoSampler.triggerAttack(note);
    }


    function rollKey(dc, dr) {
      return `${dc < 0 ? '-' : ' '}${Math.abs(dc)},${dr < 0 ? '-' : ' '}${Math.abs(dr)}`;
    }

    function stepCubes() {
      const size     = getCubeSize();
      const maxCol   = Math.floor(window.innerWidth  / size) - 1;
      const maxRow   = Math.floor(window.innerHeight / size) - 1;
      const isMobile = window.innerWidth <= 600;

      // 현재 위치 + 이동중인 목표 위치 모두 점유로 처리
      const occupied = new Set();
      cubeState.forEach(c => {
        occupied.add(`${c.col},${c.row}`);
        if (c.animating) occupied.add(`${c.targetCol},${c.targetRow}`);
      });

      // 애니메이션 중이거나 돌진 중이 아닌 큐브만 선택
      const available = cubeState.filter(c => !c.animating && !c.dashing);
      if (!available.length) return;
      const cube = available[Math.floor(Math.random() * available.length)];

      // 방향 후보 (가중치: PC→오른쪽·위, Mobile→왼쪽·아래)
      const allDirs = isMobile
        ? [ {dc:-1,dr:0},{dc:-1,dr:0},{dc:-1,dr:0},
            {dc:0,dr:-1},{dc:0,dr:-1},{dc:0,dr:-1},
            {dc:1,dr:0}, {dc:0,dr:1} ]
        : [ {dc:1,dr:0}, {dc:1,dr:0}, {dc:1,dr:0},
            {dc:0,dr:1}, {dc:0,dr:1}, {dc:0,dr:1},
            {dc:-1,dr:0},{dc:0,dr:-1} ];

      const validDirs = allDirs.filter(({dc, dr}) => {
        const nc = cube.col + dc;
        const nr = cube.row + dr;
        return nc >= 0 && nc <= maxCol
            && nr >= 0 && nr <= maxRow
            && !occupied.has(`${nc},${nr}`);
      });
      if (!validDirs.length) return;

      const { dc, dr } = validDirs[Math.floor(Math.random() * validDirs.length)];
      const { origin, angle } = ROLL[rollKey(dc, dr)];

      cube.animating  = true;
      cube.targetCol  = cube.col + dc;
      cube.targetRow  = cube.row + dr;

      const nx = cube.targetCol * size;
      const ny = cube.targetRow * size;

      playCubeMove();
      cube.el.style.transformOrigin = origin;
      cube.el.style.transition      = 'transform 0.24s ease';
      cube.el.style.transform       = `rotate(${angle}deg)`;

      setTimeout(() => {
        if (cube.dashing) return; // 돌진 중이면 회전 정리 로직 건너뛰기

        cube.el.style.transition      = 'none';
        cube.el.style.transform       = '';
        cube.el.style.transformOrigin = '';
        cube.col = cube.targetCol;
        cube.row = cube.targetRow;
        cube.el.style.left   = cube.col * size + 'px';
        cube.el.style.bottom = cube.row * size + 'px';
        cube.animating = false;

        // 착지 선 효과 — 회전 완료 직후 생성
        const line = document.createElement('div');
        const thick = Math.max(1, Math.round(size / 5));
        let lx, ly, lw, lh;

        if (dc !== 0) {
          lx = nx; ly = ny; lw = size; lh = thick;
        } else {
          lx = nx + size - thick; ly = ny; lw = thick; lh = size;
        }

        line.style.cssText = `
          position:fixed;
          left:${lx}px;
          bottom:${ly}px;
          width:${lw}px;
          height:${lh}px;
          background:#000;
          z-index:201;
          pointer-events:none;
          opacity:0;
          transition:opacity 0.05s ease;
        `;
        document.body.appendChild(line);

        requestAnimationFrame(() => {
          line.style.opacity = '1';
          setTimeout(() => {
            line.style.transition = 'opacity 0.4s ease';
            line.style.opacity = '0';
            setTimeout(() => line.remove(), 420);
          }, 80);
        });
      }, 260);
    }

    // ── Loading 완료 체크 ─────────────────────────────────────
    let imagesLoaded = false;

    function checkAllLoaded() {
      if (!imagesLoaded || !pianoReady) return;
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => loading.remove(), 750);
    }

    // 이미지 로드 추적
    function trackImages() {
      const imgs = document.querySelectorAll('.card img');
      let total = imgs.length;
      let loaded = 0;
      if (total === 0) { imagesLoaded = true; checkAllLoaded(); return; }
      imgs.forEach(img => {
        if (img.complete && img.naturalWidth) {
          loaded++;
          if (loaded >= total) { imagesLoaded = true; checkAllLoaded(); }
        } else {
          const orig = img.onload;
          img.onload = function () {
            if (orig) orig.call(this);
            loaded++;
            if (loaded >= total) { imagesLoaded = true; checkAllLoaded(); }
          };
        }
      });
    }

    buildStack();
    initCubes();
    initPiano();
    trackImages();

    // 브라우저 오디오 정책: 첫 상호작용 시 Tone.js 컨텍스트 재개
    document.addEventListener('mousedown', () => Tone.start(), { once: true });
    document.addEventListener('touchstart', () => Tone.start(), { once: true });

    window.addEventListener('load', () => {
      setTimeout(function loop() {
        stepCubes();
        setTimeout(loop, Math.random() * 850);
      }, 2000);
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { buildStack(); initCubes(); }, 200);
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>

</body>
</html>
