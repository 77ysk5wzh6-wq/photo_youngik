<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youngik Youn</title>
  <link rel="icon" type="image/png" href="fav.png?" />
  <link rel="shortcut icon" type="image/x-icon" href="fav.png?" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script data-goatcounter="https://youngikyoun.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fffffd;
      font-family: 'Fira Mono', monospace;
    }

    /* ── Footer credit ── */
    #footer-credit {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      z-index: 60;
      padding: 0.6vh 1.2vw 1vh;
      font-family: 'Fira Mono', monospace;
      font-size: clamp(9px, 0.85vw, 13px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgb(0);
      background: #fffffd;
      white-space: nowrap;
      transition: transform 0.5s ease;
      pointer-events: none;
    }
    #footer-credit.visible {
      transform: translateX(-50%) translateY(0%);
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 2.2vh 2.4vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: clamp(8px, 0.65vw, 11px);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #111;
      white-space: nowrap;
    }

    .contact {
      display: flex;
      gap: 2vw;
    }

    .contact a {
      font-size: clamp(8px, 0.65vw, 11px);
      text-decoration: none;
      color: #111;
      letter-spacing: 0.04em;
      transition: color 0.25s;
      white-space: nowrap;
    }

    .contact a[href^="mailto"] {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .contact a:hover { color: #bbb; }
    
    .category-menu {
      position: fixed;
      left: 2.4vw;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 1.2vh;
    }

    .category-menu button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: clamp(8px, 0.65vw, 11px);
      color: #111;
      text-align: left;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.25s;
      padding: 0;
      letter-spacing: 0.04em;
    }

    .category-menu button:hover { color: #bbb; }
    .category-menu button.active { font-weight: 700; padding-left: 1em; }

    /* ── Loading screen ── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #fffffd;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      transition: opacity 0.7s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading span {
      font-family: 'Fira Mono', monospace;
      font-size: clamp(12px, 1.5vw, 18px);
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #111;
    }

    #loading .loading-text {
      font-size: clamp(10px, 1.2vw, 14px);
      color: rgb(241,165,250);
      letter-spacing: 0.05em;
    }

    /* 큐브는 JS가 개별 position:fixed로 관리 */
    .color-dots span {
      position: fixed;
      display: block;
      z-index: 200;
      pointer-events: all;
      cursor: pointer;
    }

    .stack {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }

    .card {
      position: absolute;
      pointer-events: all;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      -webkit-user-drag: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    @media (max-width: 600px) {
      header { padding: 4vw 5vw; }
      header h1 { font-size: 10px; letter-spacing: 0; }
      .contact { gap: 5vw; }
      .contact a { font-size: 10px; }
      .category-menu {
        left: 5vw;
        top: calc(4vw + 24px); /* 헤비 아래에 위치 */
        bottom: auto;
        transform: none;
        flex-direction: row;
        gap: 4vw;
      }
      .category-menu button { font-size: 10px; }
      .category-menu button.active { padding-left: 0; }
    }
  </style>
</head>
<body>

  <div id="loading">
    <span>youngik youn </span>
    <span class="loading-text">loading...</span>
  </div>

  <header>
    <h1>Youngik Youn – Seoul</h1>
    <div class="contact">
      <a href="https://instagram.com/youngikyoun" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:yge05096@naver.com">yge05096@naver.com</a>
    </div>
  </header>

  <nav class="category-menu">
    <button id="btn-daily_dump" class="active" onclick="switchProject('daily_dump')">daily_dump</button>
    <button id="btn-cage3000" onclick="switchProject('cage3000')">cage3000</button>
    <button id="btn-lyjel" onclick="switchProject('lyjel')">lyjel</button>
  </nav>

  <div class="color-dots">
    <span class="orig" style="background:rgb(134,100,213)"></span>
    <span class="orig" style="background:rgb(218,254,99)"></span>
    <span class="orig" style="background:rgb(241,165,250)"></span>
    <span class="orig" style="background:rgb(230,52,35)"></span>
    <span class="orig" style="background:rgb(0,0,0)"></span>
  </div>

  <div class="stack" id="stack"></div>

  <div id="footer-credit">Web design by youngik youn</div>

  <script>
    // ── Projects configuration ──────────────────────────────
    const PROJECTS = {
      daily_dump: { path: 'assets_web', prefix: 'daily_dump', count: 20 },
      cage3000:   { path: 'asset_cage3000', prefix: 'cage3000', count: 11 },
      lyjel:      { path: 'asset_lyjel', prefix: 'lyjel', count: 11 }
    };

    let currentProject = 'daily_dump';
    let IMAGES = [];
    let layout = [];
    let isRecalling = false;
    let COLOR_HOMES = {}; // 각 색상별 초기 위치 저장

    function loadProject(projectId) {
      const config = PROJECTS[projectId];
      IMAGES = Array.from({length: config.count}, (_, i) =>
        `${config.path}/${config.prefix}_${String(i + 1).padStart(2, '0')}.jpg`
      );
      
      shuffle(IMAGES);
      
      // daily_dump일 때만 15번 고정 (기존 로직 유지)
      if (projectId === 'daily_dump') {
        const frontPhoto = 'assets_web/daily_dump_15.jpg';
        const frontIdx = IMAGES.indexOf(frontPhoto);
        if (frontIdx > -1) {
          IMAGES.splice(frontIdx, 1);
          IMAGES.push(frontPhoto);
        }
      }

      const rand = mulberry32(Date.now());
      layout = IMAGES.map(() => ({ ratio: rand() }));
      
      buildStack();
    }

    function switchProject(projectId) {
      if (currentProject === projectId) return;
      currentProject = projectId;

      // 카테고리 전환 시 사진 클릭과 같은 소리 재생
      playTypewriter();

      // 큐브 복귀 애니메이션 시작
      recallAllCubes();

      // 버튼 활성화 표시
      document.querySelectorAll('.category-menu button').forEach(btn => {
        btn.classList.toggle('active', btn.id === `btn-${projectId}`);
      });

      // 스택 비우기 애니메이션 혹은 즉시 교체
      container.style.opacity = '0';
      setTimeout(() => {
        loadProject(projectId);
        container.style.opacity = '1';
      }, 300);
    }

    function recallAllCubes() {
      if (isRecalling) return;
      isRecalling = true;

      // 이스터에그 상태인 경우 모든 큐브 즉시 제거 후 5개 초기 상태로 재등장
      if (isEasterEggActive) {
        cubeState.forEach(c => c.el.remove());
        cubeState = [];
        isEasterEggActive = false;
        
        spawnBaseCubes();
        
        // isRecalling은 spawnBaseCubes 내부의 2초 후 첫 이동이 끝난 뒤에 false로 변경
        return;
      }

      const duration = 600; // 0.6초 내 복귀 시도
      let finishedCount = 0;
      const total = cubeState.filter(c => !c.dashing).length;

      if (total === 0) {
        isRecalling = false;
        return;
      }

      cubeState.forEach(cube => {
        if (cube.dashing) return;
        
        // 색상에 맞는 '진짜' 초기 위치 할당
        const home = COLOR_HOMES[cube.color];
        const targetCol = home ? home.col : cube.initialCol;
        const targetRow = home ? home.row : cube.initialRow;

        const dist = Math.abs(cube.col - targetCol) + Math.abs(cube.row - targetRow);
        if (dist === 0) {
          finishedCount++;
          if (finishedCount === total) isRecalling = false;
          return;
        }

        // 각 스텝의 간격 계산 (최소 50ms)
        const stepDelay = Math.max(50, Math.floor(duration / dist));
        
        let retryCount = 0;
        let totalSteps = 0;
        let done = false; // 이 큐브가 복귀 완료 여부 (중복 카운트 방지)
        const maxSteps = (Math.floor(window.innerWidth / getCubeSize()) + 
                          Math.floor(window.innerHeight / getCubeSize())) * 3;
        const MAX_RETRY = 8;

        function finish() {
          if (done) return;
          done = true;
          // 현재 위치가 홈과 미세하게 다를 수 있으니 강제 스냅으로 정확히 고정
          cube.el.style.transition = 'none';
          cube.el.style.transform = '';
          cube.el.style.transformOrigin = '';
          cube.animating = false;
          const size = getCubeSize();
          cube.col = targetCol;
          cube.row = targetRow;
          cube.el.style.left   = targetCol * size + 'px';
          cube.el.style.bottom = targetRow * size + 'px';
          finishedCount++;
          if (finishedCount === total) isRecalling = false;
        }

        function nextStep() {
          if (done) return; // 이미 완료된 큐브는 더 이상 이동 안 함

          if (cube.dashing) {
            finish();
            return;
          }

          // 홈 도착 → 즉시 스냅으로 확정
          if (cube.col === targetCol && cube.row === targetRow) {
            finish();
            return;
          }

          // 너무 많이 맴돌면 강제 귀환
          if (totalSteps > maxSteps) {
            finish();
            return;
          }

          // 목표 방향 계산
          let preferDc = 0, preferDr = 0;
          if (cube.col !== targetCol) {
            preferDc = cube.col < targetCol ? 1 : -1;
          } else if (cube.row !== targetRow) {
            preferDr = cube.row < targetRow ? 1 : -1;
          }

          const size = getCubeSize();
          let directions = [{ dc: preferDc, dr: preferDr }];

          if (retryCount >= MAX_RETRY) {
            if (preferDc !== 0) {
              const drToward = cube.row < targetRow ? 1 : (cube.row > targetRow ? -1 : 0);
              const drAway   = -drToward || 1;
              directions.push({ dc: 0, dr: drToward || 1 });
              directions.push({ dc: 0, dr: drAway });
            } else {
              const dcToward = cube.col < targetCol ? 1 : (cube.col > targetCol ? -1 : 0);
              const dcAway   = -dcToward || 1;
              directions.push({ dc: dcToward || 1, dr: 0 });
              directions.push({ dc: dcAway, dr: 0 });
            }
            retryCount = 0;
          }

          let moved = false;
          for (const { dc, dr } of directions) {
            const nc = cube.col + dc;
            const nr = cube.row + dr;
            if (nc < 0 || nr < 0 ||
                nc > Math.floor(window.innerWidth / size) - 1 ||
                nr > Math.floor(window.innerHeight / size) - 1) continue;
            if (isOccupied(nc, nr, cube)) continue;

            if (performRoll(cube, dc, dr, true, () => {
              retryCount = 0;
              totalSteps++;
              setTimeout(nextStep, 10);
            })) {
              moved = true;
              break;
            }
          }

          if (!moved) {
            retryCount++;
            setTimeout(nextStep, 20);
          }
        }
        nextStep();

      });
    }

    function spawnBaseCubes() {
      const containerGrams = document.querySelector('.color-dots');
      const size = getCubeSize();
      
      CUBE_COLORS.forEach(colorStr => {
        const normColor = colorStr.replace(/\s/g, '');
        const home = COLOR_HOMES[normColor];
        if (!home) return;

        const span = document.createElement('span');
        span.style.background = colorStr;
        span.style.width  = size + 'px';
        span.style.height = size + 'px';
        span.style.left   = home.col * size + 'px';
        span.style.bottom = home.row * size + 'px';
        span.style.opacity = '0';
        span.style.transition = 'opacity 1s ease';
        
        containerGrams.appendChild(span);
        
        const cubeObj = { 
          col: home.col, 
          row: home.row, 
          initialCol: home.col, 
          initialRow: home.row, 
          el: span, 
          dashing: false, 
          color: normColor 
        };
        
        span.onclick = () => dashToWall(cubeObj);
        cubeState.push(cubeObj);

        // 다음 프레임에서 페이드 인 시작
        requestAnimationFrame(() => {
          span.style.opacity = '1';
        });

        // 1초 후(페이드 인 완료 시점) 무작위 이동 및 피아노 소리 재생
        setTimeout(() => {
          const validDirs = [];
          [ {dc:1, dr:0}, {dc:-1, dr:0}, {dc:0, dr:1}, {dc:0, dr:-1} ].forEach(d => {
            const nc = cubeObj.col + d.dc;
            const nr = cubeObj.row + d.dr;
            if (nc >= 0 && nc <= Math.floor(window.innerWidth/size)-1 && 
                nr >= 0 && nr <= Math.floor(window.innerHeight/size)-1 &&
                !isOccupied(nc, nr, cubeObj)) {
              validDirs.push(d);
            }
          });
          if (validDirs.length) {
            const { dc, dr } = validDirs[Math.floor(Math.random() * validDirs.length)];
            performRoll(cubeObj, dc, dr);
          }
          
          // 모든 큐브의 타임아웃이 끝날 때쯤 메인 루프 재개 (한 번만 실행되도록 체크)
          setTimeout(() => {
            isRecalling = false;
          }, 500);
        }, 2000);
      });
    }

    function isOccupied(c, r, ignoreCube) {
      return cubeState.some(cube => {
        if (cube === ignoreCube) return false;
        if (cube.dashing) return false;
        // 현재 위치 또는 이동 중인 목표 위치 확인
        if (cube.col === c && cube.row === r) return true;
        if (cube.animating && cube.targetCol === c && cube.targetRow === r) return true;
        return false;
      });
    }

    function performRoll(cube, dc, dr, isRecall = false, callback = null) {
      if (cube.animating || cube.dashing) return false;
      
      const size = getCubeSize();
      const { origin, angle } = ROLL[rollKey(dc, dr)];

      cube.animating = true;
      cube.targetCol = cube.col + dc;
      cube.targetRow = cube.row + dr;

      const nx = cube.targetCol * size;
      const ny = cube.targetRow * size;

      // 소리 결정
      if (isRecall) playWoodKnock();
      else playCubeMove();

      cube.el.style.transformOrigin = origin;
      cube.el.style.transition      = `transform ${isRecall ? 0.08 : 0.24}s ease`; 
      cube.el.style.transform       = `rotate(${angle}deg)`;

      setTimeout(() => {
        if (cube.dashing) {
          if (callback) callback();
          return;
        }

        cube.el.style.transition      = 'none';
        cube.el.style.transform       = '';
        cube.el.style.transformOrigin = '';
        cube.col = cube.targetCol;
        cube.row = cube.targetRow;
        cube.el.style.left   = cube.col * size + 'px';
        cube.el.style.bottom = cube.row * size + 'px';
        cube.animating = false;

        if (callback) callback();
      }, isRecall ? 90 : 260);

      return true;
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    const container = document.getElementById('stack');
    let deck = [];

    const GAP = 16;
    const MOBILE_BOTTOM = window.innerHeight * 0.055;

    function calcSize(img, ratio) {
      const isMobile = window.innerWidth <= 600;
      const headerH = document.querySelector('header').offsetHeight;
      const catMenu = document.querySelector('.category-menu');
      
      let topReserved = headerH;
      if (isMobile && catMenu) {
        const rect = catMenu.getBoundingClientRect();
        topReserved = rect.bottom;
      }

      const bottomGap = isMobile ? MOBILE_BOTTOM : GAP;
      const availH = window.innerHeight - topReserved - bottomGap - (GAP * 1.5);
      
      const rightGap = isMobile ? GAP / 2 : GAP;
      const availW = window.innerWidth - rightGap;
      const isLandscape = img.naturalWidth >= img.naturalHeight;
      const ar = img.naturalHeight / img.naturalWidth;
      
      let w;
      if (isMobile) {
        if (isLandscape) {
          const maxW = availW * 0.9;
          w = maxW * (0.8 + ratio * 0.2);
        } else {
          const maxW = availW * 0.9;
          const minW = maxW * 0.78;
          w = minW + ratio * (maxW - minW);
          if (w * ar > availH) w = availH / ar;
        }
      } else {
        const screenAR = window.innerWidth / window.innerHeight;
        const isUltraWide = screenAR >= 2.0;

        if (isLandscape) {
          const mod = isUltraWide ? 0.7 : 1.0;
          const maxW = window.innerWidth * 0.72 * mod;
          const minW = maxW * 0.56;
          w = minW + ratio * (maxW - minW);
        } else {
          const mod = isUltraWide ? 0.82 : 1.0;
          const maxH = window.innerHeight * 0.9 * mod;
          const minH = maxH * 0.78;
          const h = minH + ratio * (maxH - minH);
          w = h / ar;
        }
      }
      return w;
    }

    function buildStack() {
      container.innerHTML = '';
      deck = [];
      IMAGES.forEach((src, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        const isMobile = window.innerWidth <= 600;
        const bottomGap = isMobile ? MOBILE_BOTTOM : GAP;
        const rightGap  = isMobile ? GAP / 2 : GAP;
        card.style.cssText = `right:${rightGap}px; bottom:${bottomGap}px; z-index:${i + 1};`;
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.loading = i >= IMAGES.length - 4 ? 'eager' : 'lazy';
        img.onload = function () {
          card.style.width = calcSize(img, layout[i].ratio) + 'px';
          card.style.opacity = '1';
        };
        img.addEventListener('dragstart', e => e.preventDefault());
        card.appendChild(img);
        container.appendChild(card);
        deck.push(card);
      });
      bindCards();
    }

    function randomizeSize(card) {
      const img = card.querySelector('img');
      if (!img || !img.naturalWidth) return;
      card.style.width = calcSize(img, Math.random()) + 'px';
    }

    function sendToBack(card) {
      playTypewriter();
      // 스택에서 제거 후 맨 앞(index 0)으로
      const idx = deck.indexOf(card);
      if (idx === -1) return;
      deck.splice(idx, 1);
      deck.unshift(card);
      deck.forEach((c, i) => (c.style.zIndex = i + 1));
      // 위치를 다시 오른쪽 하단 기본값으로
      const isMobile = window.innerWidth <= 600;
      const bottomGap = isMobile ? MOBILE_BOTTOM : GAP;
      const rightGap  = isMobile ? GAP / 2 : GAP;
      card.style.left   = '';
      card.style.top    = '';
      card.style.right  = rightGap + 'px';
      card.style.bottom = bottomGap + 'px';
      randomizeSize(card);
    }

    // ── Drag & click ─────────────────────────────────────────
    let dragState = null;
    const DRAG_THRESHOLD = 6;

    function bindCards() {
      deck.forEach(card => {
        card.onmousedown  = e => pointerDown(e, card, e.clientX, e.clientY);
        card.ontouchstart = e => {
          const touch = e.touches[0];
          pointerDown(e, card, touch.clientX, touch.clientY);
        };
      });
    }

    function pointerDown(e, card, cx, cy) {
      e.preventDefault();
      // 드래그 시작 전 left/top으로 전환
      const rect = card.getBoundingClientRect();
      card.style.left   = rect.left + 'px';
      card.style.top    = rect.top  + 'px';
      card.style.right  = 'auto';
      card.style.bottom = 'auto';
      card.style.cursor = 'grabbing';

      dragState = {
        card,
        startX:  cx,
        startY:  cy,
        offsetX: cx - rect.left,
        offsetY: cy - rect.top,
        moved:   false,
      };
    }

    document.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
    document.addEventListener('touchmove', e => {
      if (!dragState) return;
      e.preventDefault();
      const t = e.touches[0];
      pointerMove(t.clientX, t.clientY);
    }, { passive: false });

    function pointerMove(cx, cy) {
      if (!dragState) return;
      const dx = cx - dragState.startX;
      const dy = cy - dragState.startY;
      if (!dragState.moved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
        dragState.moved = true;
      }
      if (!dragState.moved) return;
      dragState.card.style.left = (cx - dragState.offsetX) + 'px';
      dragState.card.style.top  = (cy - dragState.offsetY) + 'px';
    }

    document.addEventListener('mouseup',   () => pointerUp());
    document.addEventListener('touchend',  () => pointerUp());

    function pointerUp() {
      if (!dragState) return;
      const { card, moved } = dragState;
      dragState = null;
      card.style.cursor = '';

      if (!moved) {
        // 그냥 클릭 → 맨 뒤로
        sendToBack(card);
      // 드래그든 클릭이든 z-index는 건드리지 않음
      }
      bindCards();
    }

    function playTypewriter() {
      // 전역 Tone.context.rawContext를 공유하여 오디오 버스트 방지
      const ctx = Tone.context.rawContext;
      if (ctx.state !== 'running') return;
      const t = ctx.currentTime;

      // 짧은 고주파 노이즈
      const bufferSize = ctx.sampleRate * 0.025;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 12);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const hpf = ctx.createBiquadFilter();
      hpf.type = 'highpass';
      hpf.frequency.value = 4000;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.025);

      // 리버브 — 짧은 임펄스 컨볼버
      const reverbLen = ctx.sampleRate * 0.6;
      const reverbBuf = ctx.createBuffer(2, reverbLen, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const d = reverbBuf.getChannelData(ch);
        const noiseData = new Float32Array(reverbLen);
        for (let i = 0; i < reverbLen; i++) {
          noiseData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLen, 5);
        }
        d.set(noiseData);
      }
      const convolver = ctx.createConvolver();
      convolver.buffer = reverbBuf;

      const reverbGain = ctx.createGain();
      reverbGain.gain.value = 0.18;

      const dryGain = ctx.createGain();
      dryGain.gain.value = 1;

      // 저음 — 아주 짧고 작은 틱
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.03);
      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.04, t);
      oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

      noise.connect(hpf);
      hpf.connect(gain);
      gain.connect(dryGain);
      gain.connect(convolver);
      convolver.connect(reverbGain);
      dryGain.connect(ctx.destination);
      reverbGain.connect(ctx.destination);
      osc.connect(oscGain);
      oscGain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.03);

      noise.start(t);
      noise.stop(t + 0.025);
    }

    function playWoodKnock() {
      const ctx = Tone.context.rawContext;
      if (ctx.state !== 'running') return;
      const t = ctx.currentTime;

      // 1. 아주 짧고 드라이한 타격감 (Sine wave)
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(250, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.03);
      
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.1, t); // 볼륨 30% 추가 축소
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

      // 2. 둔탁한 질감 (Noise - 더 짧은 지속시간)
      const bufferSize = ctx.sampleRate * 0.03;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 8); // 더 급격한 감쇄
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const lpf = ctx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.value = 800;

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.03, t); // 볼륨 축소
      noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);

      osc.connect(gain);
      gain.connect(ctx.destination);
      
      noise.connect(lpf);
      lpf.connect(noiseGain);
      noiseGain.connect(ctx.destination);

      osc.start(t);
      osc.stop(t + 0.03);
      noise.start(t);
      noise.stop(t + 0.03);
    }

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'ArrowRight') {
        if (deck.length) sendToBack(deck[deck.length - 1]);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') e.preventDefault();
    });

    // ── Color cubes ──────────────────────────────────────────
    const CUBE_COLORS = [
      'rgb(134,100,213)',
      'rgb(218,254,99)',
      'rgb(241,165,250)',
      'rgb(230,52,35)',
      'rgb(0,0,0)',
    ];

    function getCubeSize() {
      return window.innerWidth <= 600 ? 10 : 16;
    }

    let cubeState = [];
    let isEasterEggActive = false;

    function activateEasterEgg() {
      if (isEasterEggActive) return;
      isEasterEggActive = true;
      
      const containerGrams = document.querySelector('.color-dots');
      const weightedColors = [
        ...CUBE_COLORS.slice(0, 4), // Purple, Lime, Pink, Red
        ...CUBE_COLORS.slice(0, 4), 
        ...CUBE_COLORS.slice(0, 4), // (각 3번씩 추가)
        CUBE_COLORS[4],             // Black
        CUBE_COLORS[4]              // (2번 추가하여 1.5배 비율 유지)
      ];

      const size = getCubeSize();
      const maxCol = Math.floor(window.innerWidth / size) - 1;
      const maxRow = Math.floor(window.innerHeight / size) - 1;

      let count = 0;
      const totalCubes = 30;
      const duration = 2000; // 2초
      const interval = duration / totalCubes;

      function spawn() {
        if (count >= totalCubes) return;

        const span = document.createElement('span');
        const color = weightedColors[Math.floor(Math.random() * weightedColors.length)];
        span.style.background = color;
        
        const col = Math.floor(Math.random() * (maxCol + 1));
        const row = Math.floor(Math.random() * (maxRow + 1));

        span.style.width  = size + 'px';
        span.style.height = size + 'px';
        span.style.left   = col * size + 'px';
        span.style.bottom = row * size + 'px';
        
        containerGrams.appendChild(span);
        
        const cubeObj = { 
          col, 
          row, 
          el: span, 
          dashing: false, 
          color: color.replace(/\s/g, '') 
        };
        
        span.onclick = () => dashToWall(cubeObj);
        cubeState.push(cubeObj);

        // 등장할 때마다 랜덤한 피아노 음
        playCubeMove();

        count++;
        setTimeout(spawn, interval);
      }

      spawn();
    }

    function initCubes() {
      const size   = getCubeSize();
      const isMobile = window.innerWidth <= 600;
      const headerH  = document.querySelector('header').offsetHeight;
      const spans    = Array.from(document.querySelectorAll('.color-dots span'));

      const maxCol   = Math.floor(window.innerWidth  / size) - 1;
      const maxRow   = Math.floor(window.innerHeight / size) - 1;

      let startCols, startRow;

      if (isMobile) {
        // 헤더 바로 아래, 오른쪽 끝에 딱 붙게
        const rightEdge = Math.floor(window.innerWidth / size) - 1;
        startCols = spans.map((_, i) => rightEdge - (spans.length - 1 - i));
        startRow  = Math.floor((window.innerHeight - headerH) / size) - 1;
      } else {
        // 왼쪽 하단
        const baseCol = Math.floor(window.innerWidth * 0.024 / size);
        const baseRow = Math.floor(window.innerHeight * 0.024 / size);
        startCols = spans.map((_, i) => baseCol + i);
        startRow  = baseRow;
      }

      cubeState = spans.map((el, i) => {
        let col = startCols[i];
        let row = startRow;

        el.style.width  = size + 'px';
        el.style.height = size + 'px';
        el.style.left   = col * size + 'px';
        el.style.bottom = row * size + 'px';
        
        // 색상 추출 및 '홈' 좌표 저장
        const color = el.style.background.replace(/\s/g, ''); 
        COLOR_HOMES[color] = { col, row };

        const cubeObj = { col, row, initialCol: col, initialRow: row, el, dashing: false, color };
        el.onclick = () => dashToWall(cubeObj);
        return cubeObj;
      });
    }

    function dashToWall(cube) {
      if (cube.dashing) return;
      cube.dashing = true;
      cube.animating = false; // 진행 중인 회전 상태 수동 해제
      playTypewriter();

      // 모든 큐브가 클릭된 상태(돌진 예정)인지 확인 (이스터에그 발동)
      if (cubeState.every(c => c.dashing)) {
        activateEasterEgg();
      }

      const el = cube.el;
      // 현재 회전 애니메이션 등이 있다면 즉시 중단
      el.style.transition = 'none';
      el.style.transform = 'none';
      
      const rect = el.getBoundingClientRect();
      const currentWidth = rect.width;
      el.style.left = rect.left + 'px';
      el.style.bottom = (window.innerHeight - rect.bottom) + 'px';

      // 왼쪽 벽으로 돌진
      const targetLeft = 0;
      const distance = rect.left;

      // 거리 비례 속도
      const duration = (distance / 1000) + 0.3; 
      
      requestAnimationFrame(() => {
        el.style.transition = `left ${duration}s linear`;
        el.style.left = targetLeft + 'px';
      });

      const onHitWall = (e) => {
        if (e.propertyName === 'left') {
          el.removeEventListener('transitionend', onHitWall);
          
          // 벽에 부딪히며 사라짐 (폭 줄어들기)
          el.style.transition = 'width 0.4s ease-in, opacity 0.4s ease-in';
          el.style.width = '0px';
          el.style.opacity = '0';

          setTimeout(() => {
            el.remove();
            const idx = cubeState.indexOf(cube);
            if (idx !== -1) cubeState.splice(idx, 1);
          }, 450);
        }
      };
      el.addEventListener('transitionend', onHitWall);
    }

    // 방향별 pivot corner & 회전 각도
    const ROLL = {
      ' 1, 0': { origin: 'right bottom', angle:  90 }, // 오른쪽
      '-1, 0': { origin: 'left bottom',  angle: -90 }, // 왼쪽
      ' 0, 1': { origin: 'right top',    angle:  90 }, // 위
      ' 0,-1': { origin: 'right bottom', angle: -90 }, // 아래
    };

    // 저음 위주 + 고음 일부 (C2~C5)
    const PIANO_NOTES = [
      'C2','E2','G2','A2',
      'C3','D3','E3','G3','A3','B3',
      'C4','D4','E4','G4','A4',
      'C5','E5'
    ];

    let pianoSampler = null;
    let pianoReady   = false;

    function initPiano() {
      // C2~E5 범위에 필요한 샘플만 로드
      pianoSampler = new Tone.Sampler({
        urls: {
          C2: 'C2.mp3', 'D#2': 'Ds2.mp3', 'F#2': 'Fs2.mp3', A2: 'A2.mp3',
          C3: 'C3.mp3', 'D#3': 'Ds3.mp3', 'F#3': 'Fs3.mp3', A3: 'A3.mp3',
          C4: 'C4.mp3', 'D#4': 'Ds4.mp3', 'F#4': 'Fs4.mp3', A4: 'A4.mp3',
          C5: 'C5.mp3', 'D#5': 'Ds5.mp3',
        },
        baseUrl: 'https://tonejs.github.io/audio/salamander/',
        release: 2.5,
        onload: () => {
          pianoReady = true;
          checkAllLoaded();
        },
      }).toDestination();
      pianoSampler.volume.value = -20;
    }

    function playCubeMove() {
      if (!pianoReady) return;
      const note = PIANO_NOTES[Math.floor(Math.random() * PIANO_NOTES.length)];
      // attack만 트리거 — release 자연스럽게 울리도록 (겹침 허용)
      pianoSampler.triggerAttack(note);
    }


    function rollKey(dc, dr) {
      return `${dc < 0 ? '-' : ' '}${Math.abs(dc)},${dr < 0 ? '-' : ' '}${Math.abs(dr)}`;
    }

    function stepCubes() {
      const size     = getCubeSize();
      const maxCol   = Math.floor(window.innerWidth  / size) - 1;
      const maxRow   = Math.floor(window.innerHeight / size) - 1;
      const isMobile = window.innerWidth <= 600;

      // 현재 위치 + 이동중인 목표 위치 모두 점유로 처리
      const occupied = new Set();
      cubeState.forEach(c => {
        occupied.add(`${c.col},${c.row}`);
        if (c.animating) occupied.add(`${c.targetCol},${c.targetRow}`);
      });

      // 애니메이션 중이거나 돌진 중이 아닌 큐브만 선택
      const available = cubeState.filter(c => !c.animating && !c.dashing);
      if (!available.length) return;
      const cube = available[Math.floor(Math.random() * available.length)];

      // 방향 후보 (가중치: PC→오른쪽·위, Mobile→왼쪽·아래)
      const allDirs = isMobile
        ? [ {dc:-1,dr:0},{dc:-1,dr:0},{dc:-1,dr:0},{dc:-1,dr:0},
            {dc:0,dr:-1},{dc:0,dr:-1},{dc:0,dr:-1},{dc:0,dr:-1},
            {dc:1,dr:0}, {dc:0,dr:1} ]
        : [ {dc:1,dr:0}, {dc:1,dr:0}, {dc:1,dr:0}, {dc:1,dr:0},
            {dc:0,dr:1}, {dc:0,dr:1}, {dc:0,dr:1}, {dc:0,dr:1},
            {dc:-1,dr:0},{dc:0,dr:-1} ];

      const validDirs = allDirs.filter(({dc, dr}) => {
        const nc = cube.col + dc;
        const nr = cube.row + dr;
        return nc >= 0 && nc <= maxCol
            && nr >= 0 && nr <= maxRow
            && !occupied.has(`${nc},${nr}`);
      });
      if (!validDirs.length) return;

      const { dc, dr } = validDirs[Math.floor(Math.random() * validDirs.length)];
      performRoll(cube, dc, dr);
    }

    // ── Loading 완료 체크 ─────────────────────────────────────
    let imagesLoaded = false;

    function checkAllLoaded() {
      if (!imagesLoaded || !pianoReady) return;
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => loading.remove(), 750);
    }

    // 이미지 로드 추적
    function trackImages() {
      const imgs = document.querySelectorAll('.card img');
      let total = imgs.length;
      let loaded = 0;
      if (total === 0) { imagesLoaded = true; checkAllLoaded(); return; }
      imgs.forEach(img => {
        if (img.complete && img.naturalWidth) {
          loaded++;
          if (loaded >= total) { imagesLoaded = true; checkAllLoaded(); }
        } else {
          const orig = img.onload;
          img.onload = function () {
            if (orig) orig.call(this);
            loaded++;
            if (loaded >= total) { imagesLoaded = true; checkAllLoaded(); }
          };
        }
      });
    }

    loadProject('daily_dump');
    initCubes();
    initPiano();
    trackImages();

    // 브라우저 오디오 정책: 첫 상호작용 시 Tone.js 컨텍스트 재개
    document.addEventListener('mousedown', () => Tone.start(), { once: true });
    document.addEventListener('touchstart', () => Tone.start(), { once: true });

    let cubeLoopId = null;
    function runCubeLoop() {
      if (document.hidden) return;
      cubeLoopId = setTimeout(function loop() {
        // 사운드가 활성화(사용자 클릭 완료)된 경우에만 큐브 루프를 돌림
        if (!isRecalling && !document.hidden && Tone.context.state === 'running') {
          stepCubes();
        }
        const delay = (Math.random() * 1050) / (isEasterEggActive ? 4 : 1);
        cubeLoopId = setTimeout(loop, delay);
      }, 2000);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearTimeout(cubeLoopId);
        cubeLoopId = null;
      } else {
        if (!cubeLoopId) runCubeLoop();
      }
    });

    window.addEventListener('load', () => {
      runCubeLoop();
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { buildStack(); initCubes(); }, 200);
    });

    document.addEventListener('contextmenu', e => e.preventDefault());

    // ── Footer credit scroll reveal ──────────────────────────
    const footerCredit = document.getElementById('footer-credit');
    let footerVisible = false;
    let footerTimer = null;

    function showFooter() {
      if (!footerVisible) {
        footerVisible = true;
        footerCredit.classList.add('visible');
      }
      // 스크롤을 멈추면 2.5초 후 자동으로 숨김
      clearTimeout(footerTimer);
      footerTimer = setTimeout(hideFooter, 2500);
    }

    function hideFooter() {
      footerVisible = false;
      footerCredit.classList.remove('visible');
    }

    // 마우스 휠 감지
    window.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) showFooter();   // 아래로 스크롤
      else hideFooter();                 // 위로 스크롤
    }, { passive: true });

    // 터치 스와이프 감지 (모바일)
    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener('touchmove', (e) => {
      const dy = touchStartY - e.touches[0].clientY;
      if (dy > 10) showFooter();        // 위로 스와이프 (= 아래로 스크롤)
      else if (dy < -10) hideFooter();  // 아래로 스와이프 (= 위로 스크롤)
    }, { passive: true });
  </script>
